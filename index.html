<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Quản Lý Học Viên SMS - HỌC VIỆN ÔN NGỌC BeU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    @media print {
      @page { size: A4 portrait; margin: 10mm; }
      body { background-color: white !important; }
      .print\:hidden { display: none !important; }
      .print\:border-0 { border: none !important; }
      .print\:shadow-none { box-shadow: none !important; }
      .print\:p-0 { padding: 0 !important; }
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    
    /* Tùy chỉnh thanh cuộn cho bảng dữ liệu */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 bg-fixed min-h-screen text-slate-800 relative antialiased selection:bg-[#27bdbe] selection:text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbykXtJdesSyfqK_tZX_bWRNT_4B9EiRB8GoOs2A3kKwfe1doE0AIyElvmOpxQmA7kWu/exec';

    function App() {
      const [activeTab, setActiveTab] = useState('manage');
      const [students, setStudents] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [notification, setNotification] = useState(null);
      const reportRef = useRef();

      // Filter State
      const currentYear = new Date().getFullYear();
      const [filterType, setFilterType] = useState('ALL');
      const [startDate, setStartDate] = useState(`${currentYear}-01-01`);
      const [endDate, setEndDate] = useState(`${currentYear}-12-31`);
      const [filterBranch, setFilterBranch] = useState('ALL');
      const [searchQuery, setSearchQuery] = useState(''); // Thêm state lưu từ khóa tìm kiếm

      // Modal Confirmation State
      const [showConfirmModal, setShowConfirmModal] = useState(false);
      const [showDeleteModal, setShowDeleteModal] = useState(false);
      const [showEvalModal, setShowEvalModal] = useState(false);
      const [studentActionTarget, setStudentActionTarget] = useState(null);
      
      // Form State
      const defaultForm = { id: '', fullName: '', dob: '', tenLop: '', gender: '', course: '', branch: '', enrollmentDate: new Date().toISOString().slice(0, 10) };
      const [formData, setFormData] = useState(defaultForm);
      const [isEditing, setIsEditing] = useState(false);

      // Eval State (dùng để lưu tạm điểm khi nhập trên UI)
      const [evalData, setEvalData] = useState({});

      const calculateAge = (dobString) => {
        if (!dobString) return 0;
        const today = new Date();
        const birthDate = new Date(dobString);
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) age--;
        return age;
      };

      const getAttendanceStatus = (total, attended) => {
        if (!total || total <= 0 || attended === '' || attended === null) return '';
        const ratio = (Number(attended) / Number(total)) * 100;
        if (ratio >= 95) return 'XUẤT_SẮC';
        if (ratio >= 90) return 'TỐT';
        if (ratio >= 80) return 'KHÁ';
        if (ratio >= 70) return 'TRUNG_BÌNH';
        return 'CHƯA_ĐẠT';
      };

      const getSkillStatus = (score, course) => {
        if (score === '' || score === null || score === undefined) return '';
        const num = Number(score);
        const is200Scale = course === 'Tiếng Trung sơ cấp' || course === 'Tiếng Trung thiếu nhi';
        const maxScore = is200Scale ? 200 : 300;
        const ratio = (num / maxScore) * 100;
        
        if (ratio >= 90) return 'XUẤT_SẮC';
        if (ratio >= 80) return 'GIỎI';
        if (ratio >= 70) return 'KHÁ';
        if (ratio >= 50) return 'TRUNG_BÌNH';
        return 'CHƯA_ĐẠT';
      };

      const getFinalGrade = (attStatus, skillStatus) => {
        if (!attStatus || !skillStatus) return 'CHƯA_ĐÁNH_GIÁ';
        return skillStatus; // Bê nguyên thang điểm xếp loại sang kết quả chung
      };

      const showNotif = (msg, type = 'success') => {
        setNotification({ msg, type });
        setTimeout(() => setNotification(null), 4000);
      };

      const formatDateForVN = (dateString) => {
        if (!dateString) return '';
        try {
          const d = new Date(dateString);
          if (isNaN(d.getTime())) return dateString;
          const day = `0${d.getDate()}`.slice(-2);
          const month = `0${d.getMonth() + 1}`.slice(-2);
          return `${day}/${month}/${d.getFullYear()}`;
        } catch(e) { return dateString; }
      };

      const formatDateForInput = (dateString) => {
        if (!dateString) return '';
        try {
          // Ép kiểu về ngày chuẩn
          const d = new Date(dateString);
          if (isNaN(d.getTime())) return dateString; 
          // Cắt gọt đúng chuẩn YYYY-MM-DD
          const year = d.getFullYear();
          const month = `0${d.getMonth() + 1}`.slice(-2);
          const day = `0${d.getDate()}`.slice(-2);
          return `${year}-${month}-${day}`;
        } catch(e) { return dateString; }
      };

      // Hàm này tạo ra tất cả các "phiên bản" tên cột để ép Google Sheet phải nhận được dữ liệu
      const buildPayloadData = (data) => {
        const payload = { ...data };
        
        // Tự động tạo ra các bản sao có dấu cách dư thừa để chống lỗi Google Sheet
        const keys = Object.keys(data);
        keys.forEach(k => {
          payload[k + ' '] = data[k];
          payload[' ' + k] = data[k];
          payload[k.toLowerCase()] = data[k];
          payload[k.toLowerCase() + ' '] = data[k];
        });

        // Dự phòng luôn cả các tiêu đề bằng Tiếng Việt
        payload['Họ và tên'] = data.fullName;
        payload['Họ và Tên'] = data.fullName;
        payload['Ngày sinh'] = data.dob;
        payload['Giới tính'] = data.gender;
        payload['Khóa học'] = data.course;
        payload['Chi nhánh'] = data.branch;
        payload['Ngày ghi danh'] = data.enrollmentDate;
        payload['Tên lớp'] = data.tenLop;

        return payload;
      };

      const fetchData = () => {
        setIsLoading(true);
        fetch(GOOGLE_SCRIPT_URL)
          .then(res => res.json())
          .then(data => {
            if (Array.isArray(data)) {
              // Chuẩn hóa dữ liệu siêu mạnh: Loại bỏ mọi khoảng trắng và đưa về chữ thường
              const normalizedData = data.map(s => {
                const cleanS = {};
                for (let key in s) {
                  const cleanKey = key.trim().toLowerCase();
                  cleanS[cleanKey] = s[key];
                }

                return {
                  ...s, // Giữ lại nguyên gốc
                  id: cleanS.id || '',
                  fullName: cleanS.fullname || cleanS['họ và tên'] || '',
                  tenLop: cleanS.tenlop || cleanS['tên lớp'] || '',
                  dob: cleanS.dob || cleanS['ngày sinh'] || '',
                  gender: cleanS.gender || cleanS['giới tính'] || '',
                  course: cleanS.course || cleanS['khóa học'] || '',
                  branch: cleanS.branch || cleanS['chi nhánh'] || 'Offline',
                  enrollmentDate: cleanS.enrollmentdate || cleanS['ngày ghi danh'] || '',
                  age: cleanS.age || '',
                  totalSessions: cleanS.totalsessions || '',
                  attendedSessions: cleanS.attendedsessions || '',
                  attendanceStatus: cleanS.attendancestatus || '',
                  skillScore: cleanS.skillscore || '',
                  skillStatus: cleanS.skillstatus || '',
                  finalGrade: cleanS.finalgrade || 'CHƯA_HOÀN_THÀNH'
                };
              });
              setStudents(normalizedData);
              
              // Khởi tạo state nội bộ cho Cổng Đánh Giá
              const evData = {};
              normalizedData.forEach(s => {
                evData[s.id] = {
                  totalSessions: s.totalSessions || '',
                  attendedSessions: s.attendedSessions || '',
                  skillScore: s.skillScore || ''
                };
              });
              setEvalData(evData);
            }
          })
          .catch(e => showNotif('Lỗi kết nối cơ sở dữ liệu!', 'error'))
          .finally(() => setIsLoading(false));
      };

      useEffect(() => {
        fetchData();
      }, []);

      const handlePreSubmit = (e) => {
        e.preventDefault();
        if (!formData.gender || !formData.course || !formData.branch) {
          showNotif('Vui lòng chọn đầy đủ Giới tính, Khóa học và Chi nhánh!', 'error');
          return;
        }
        setShowConfirmModal(true);
      };

      const executeSave = async () => {
        setShowConfirmModal(false);
        setIsLoading(true);
        const action = isEditing ? 'EDIT' : 'ADD';
        
        let finalId = formData.id;
        if (!isEditing) {
          let maxSeq = 0;
          students.forEach(s => {
            if (s.id && s.id.startsWith('ONBU')) {
              const numStr = s.id.substring(4);
              const num = parseInt(numStr, 10);
              if (!isNaN(num) && num > maxSeq) {
                maxSeq = num;
              }
            }
          });
          const nextSeq = maxSeq + 1;
          finalId = 'ONBU' + String(nextSeq).padStart(5, '0');
        }

        const age = calculateAge(formData.dob);
        
        const studentToSave = {
          ...formData,
          id: finalId,
          age: age,
          // Đảm bảo không đè mất điểm cũ khi edit thông tin cơ bản
          totalSessions: isEditing ? formData.totalSessions : '',
          attendedSessions: isEditing ? formData.attendedSessions : '',
          skillScore: isEditing ? formData.skillScore : '',
          attendanceStatus: isEditing ? formData.attendanceStatus : '',
          skillStatus: isEditing ? formData.skillStatus : '',
          finalGrade: isEditing ? formData.finalGrade : 'CHƯA_HOÀN_THÀNH'
        };

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: action, data: buildPayloadData(studentToSave) })
          });
          showNotif(isEditing ? 'Cập nhật hồ sơ thành công!' : 'Đã thêm hồ sơ thành công!');
          setFormData(defaultForm);
          setIsEditing(false);
          fetchData(); // Reload data
        } catch(e) {
          showNotif('Lỗi lưu dữ liệu. Hãy thử lại!', 'error');
          setIsLoading(false);
        }
      };

      const handleEditClick = (student) => {
        setFormData({
          id: student.id,
          fullName: student.fullName || '',
          dob: formatDateForInput(student.dob), // Đã áp dụng hàm xử lý ngày tháng mới
          tenLop: student.tenLop || '',
          gender: student.gender || '',
          course: student.course || '',
          branch: student.branch || 'Offline',
          enrollmentDate: formatDateForInput(student.enrollmentDate) || '',
          // Giữ nguyên các trường điểm
          totalSessions: student.totalSessions,
          attendedSessions: student.attendedSessions,
          skillScore: student.skillScore,
          attendanceStatus: student.attendanceStatus,
          skillStatus: student.skillStatus,
          finalGrade: student.finalGrade
        });
        setIsEditing(true);
        setActiveTab('manage');
        window.scrollTo(0, 0);
      };

      const handleDeleteClick = (student) => {
        setStudentActionTarget(student);
        setShowDeleteModal(true);
      };

      const executeDelete = async () => {
        setShowDeleteModal(false);
        if (!studentActionTarget) return;
        setIsLoading(true);
        
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'DELETE', data: { id: studentActionTarget.id } })
          });
          showNotif('Đã xóa hồ sơ vĩnh viễn!');
          setStudentActionTarget(null);
          fetchData();
        } catch(e) {
          showNotif('Lỗi khi xóa hồ sơ!', 'error');
          setIsLoading(false);
        }
      };

      const handleEvalChange = (id, field, value) => {
        setEvalData(prev => ({
          ...prev,
          [id]: { ...prev[id], [field]: value }
        }));
      };

      const handleSaveEvalClick = (student) => {
        setStudentActionTarget(student);
        setShowEvalModal(true);
      };

      const executeSaveEval = async () => {
        setShowEvalModal(false);
        if (!studentActionTarget) return;
        setIsLoading(true);

        const currentEval = evalData[studentActionTarget.id];
        const attStatus = getAttendanceStatus(Number(currentEval.totalSessions), Number(currentEval.attendedSessions));
        const skStatus = getSkillStatus(currentEval.skillScore, studentActionTarget.course);
        const finalGrade = getFinalGrade(attStatus, skStatus);

        const updatedStudent = {
          ...studentActionTarget,
          totalSessions: currentEval.totalSessions,
          attendedSessions: currentEval.attendedSessions,
          attendanceStatus: attStatus,
          skillScore: currentEval.skillScore,
          skillStatus: skStatus,
          finalGrade: finalGrade
        };

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'EDIT', data: buildPayloadData(updatedStudent) })
          });
          showNotif('Đã lưu điểm và xếp loại thành công!');
          setStudentActionTarget(null);
          fetchData();
        } catch(e) {
          showNotif('Lỗi khi lưu điểm!', 'error');
          setIsLoading(false);
        }
      };

      const handleFilterTypeChange = (type) => {
        setFilterType(type);
        const year = new Date().getFullYear();
        if (type === 'Q1') { setStartDate(`${year}-01-01`); setEndDate(`${year}-03-31`); }
        else if (type === 'Q2') { setStartDate(`${year}-04-01`); setEndDate(`${year}-06-30`); }
        else if (type === 'Q3') { setStartDate(`${year}-07-01`); setEndDate(`${year}-09-30`); }
        else if (type === 'Q4') { setStartDate(`${year}-10-01`); setEndDate(`${year}-12-31`); }
        else if (type === 'H1') { setStartDate(`${year}-01-01`); setEndDate(`${year}-06-30`); }
        else if (type === 'ALL') { setStartDate('2020-01-01'); setEndDate(`${year + 5}-12-31`); }
      };

      const filteredStudents = useMemo(() => {
        let result = students;
        if (filterType !== 'ALL') {
          result = result.filter(s => {
            const eDate = s.enrollmentDate || '2026-01-01';
            return eDate >= startDate && eDate <= endDate;
          });
        }
        if (filterBranch !== 'ALL') {
          result = result.filter(s => s.branch === filterBranch);
        }
        
        // Logic tìm kiếm theo Tên, Lớp hoặc Mã HV
        if (searchQuery.trim() !== '') {
          const query = searchQuery.toLowerCase().trim();
          result = result.filter(s => 
            (s.fullName && s.fullName.toLowerCase().includes(query)) ||
            (s.tenLop && s.tenLop.toLowerCase().includes(query)) ||
            (s.id && s.id.toLowerCase().includes(query))
          );
        }
        
        return result;
      }, [students, filterType, startDate, endDate, filterBranch, searchQuery]);

      const coursesList = ['Tiếng Trung sơ cấp', 'Tiếng Trung trung cấp', 'Tiếng Trung cao cấp', 'Tiếng Trung giao tiếp', 'Tiếng Trung thiếu nhi'];
      
      const getCourseStats = (courseName) => {
        const inCourse = filteredStudents.filter(s => s.course === courseName);
        const total = inCourse.length;
        // Đếm số lớp dựa vào cột Tên Lớp (TenLop)
        const uniqueClasses = new Set();
        inCourse.forEach(s => {
          if (s.tenLop && s.tenLop.trim() !== '') uniqueClasses.add(s.tenLop.trim().toLowerCase());
        });
        const classes = uniqueClasses.size;
        
        const females = inCourse.filter(s => s.gender === 'Nữ').length;
        const over18 = inCourse.filter(s => s.age >= 18).length;
        return { total, classes, females, over18, vn: total, students: inCourse };
      };

      const calcRatio = (count, total) => {
        if (!total || total === 0 || !count || count === 0) return '';
        const pct = ((count / total) * 100).toFixed(1).replace('.0', '');
        return `${count}/${total} = ${pct}%`;
      };

      return (
        <div className="min-h-screen pb-12 font-sans">
          {/* SPINNER LOADING GLOBAL */}
          {isLoading && (
            <div className="fixed inset-0 bg-white/70 backdrop-blur-md z-[9999] flex flex-col items-center justify-center transition-all">
              <div className="relative w-20 h-20 mb-6">
                <div className="absolute inset-0 border-4 border-[#27bdbe]/20 rounded-full"></div>
                <div className="absolute inset-0 border-4 border-[#27bdbe] border-t-transparent rounded-full animate-spin shadow-lg"></div>
              </div>
              <p className="text-slate-800 font-extrabold text-lg animate-pulse tracking-wide">Đang đồng bộ dữ liệu...</p>
              <p className="text-slate-500 text-sm mt-2 font-medium">Hệ thống đang xử lý, vui lòng chờ trong giây lát</p>
            </div>
          )}

          {/* CÁC MODAL XÁC NHẬN */}
          {showConfirmModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9998] flex items-center justify-center px-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-[0_20px_50px_-12px_rgba(0,0,0,0.3)]">
                <div className="w-14 h-14 rounded-2xl bg-teal-50 flex items-center justify-center mb-6">
                  <span className="text-teal-600 text-2xl">📝</span>
                </div>
                <h3 className="text-2xl font-extrabold text-slate-800 mb-2">{isEditing ? 'Cập Nhật Hồ Sơ' : 'Lưu Hồ Sơ Mới'}</h3>
                <p className="text-slate-600 mb-8 font-medium leading-relaxed">Bạn có chắc chắn muốn {isEditing ? 'cập nhật thông tin của Học Viên này' : 'lưu Học Viên này vào hệ thống'}?</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowConfirmModal(false)} className="px-5 py-2.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">Hủy thao tác</button>
                  <button onClick={executeSave} className="px-5 py-2.5 bg-gradient-to-r from-[#27bdbe] to-[#1da5a6] text-white font-bold rounded-xl hover:shadow-lg hover:-translate-y-0.5 transition-all">Đồng Ý Lưu</button>
                </div>
              </div>
            </div>
          )}

          {showDeleteModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9998] flex items-center justify-center px-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-[0_20px_50px_-12px_rgba(0,0,0,0.3)] border-t-4 border-rose-500">
                <div className="w-14 h-14 rounded-2xl bg-rose-50 flex items-center justify-center mb-6">
                  <span className="text-rose-600 text-2xl">🗑️</span>
                </div>
                <h3 className="text-2xl font-extrabold text-rose-600 mb-2">Xóa Hồ Sơ!</h3>
                <p className="text-slate-600 mb-4 font-medium">Bạn đang thao tác xóa Học Viên: <strong className="text-slate-900">{studentActionTarget?.fullName}</strong></p>
                <p className="text-sm text-rose-500 mb-8 bg-rose-50 p-3 rounded-lg border border-rose-100 font-medium">Hành động này sẽ xóa dữ liệu vĩnh viễn trên Database và không thể hoàn tác. Bạn chắc chắn chứ?</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowDeleteModal(false)} className="px-5 py-2.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">Hủy</button>
                  <button onClick={executeDelete} className="px-5 py-2.5 bg-gradient-to-r from-rose-500 to-rose-600 text-white font-bold rounded-xl hover:shadow-lg hover:-translate-y-0.5 transition-all">Đồng Ý Xóa</button>
                </div>
              </div>
            </div>
          )}

          {showEvalModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[9998] flex items-center justify-center px-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-[0_20px_50px_-12px_rgba(0,0,0,0.3)]">
                <div className="w-14 h-14 rounded-2xl bg-indigo-50 flex items-center justify-center mb-6">
                  <span className="text-indigo-600 text-2xl">📊</span>
                </div>
                <h3 className="text-2xl font-extrabold text-indigo-900 mb-2">Lưu Điểm Học Viên</h3>
                <p className="text-slate-600 mb-8 font-medium leading-relaxed">Xác nhận lưu kết quả đánh giá cho Học Viên <strong className="text-slate-900">{studentActionTarget?.fullName}</strong>? Hệ thống sẽ tự động xếp loại dựa trên điểm số này.</p>
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowEvalModal(false)} className="px-5 py-2.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">Hủy</button>
                  <button onClick={executeSaveEval} className="px-5 py-2.5 bg-gradient-to-r from-indigo-600 to-indigo-800 text-white font-bold rounded-xl hover:shadow-lg hover:-translate-y-0.5 transition-all">Xác Nhận Lưu</button>
                </div>
              </div>
            </div>
          )}

          {/* HEADER CHÍNH */}
          <header className="bg-white/80 backdrop-blur-lg border-b border-slate-200/60 py-4 px-6 shadow-sm sticky top-0 z-40 print:hidden">
            <div className="max-w-7xl mx-auto flex items-center justify-between">
              <div className="flex items-center space-x-4">
                {/* */}
                <div className="flex-shrink-0 shadow-md rounded-2xl overflow-hidden border-2 border-white bg-white">

                              </td>
                              <td className="py-4 px-5 text-center">
                                <input type="number" placeholder={(s.course === 'Tiếng Trung sơ cấp' || s.course === 'Tiếng Trung thiếu nhi') ? 'Max 200' : 'Max 300'} value={ev.skillScore !== undefined ? ev.skillScore : (s.skillScore || '')} onChange={e => handleEvalChange(s.id, 'skillScore', e.target.value)} className="w-24 bg-slate-100 border border-slate-200 rounded-xl px-2 py-2 text-center font-bold text-sm text-slate-700 focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/15 transition-all outline-none" />
                              </td>
                              <td className="py-4 px-5 text-center bg-indigo-50/30">
                                {tmpSkStatus === 'XUẤT_SẮC' && <span className="bg-purple-100 border border-purple-200 text-purple-700 px-3 py-1 rounded-full text-xs font-extrabold shadow-sm">Xuất sắc</span>}
                                {tmpSkStatus === 'GIỎI' && <span className="bg-blue-100 border border-blue-200 text-blue-700 px-3 py-1 rounded-full text-xs font-extrabold shadow-sm">Giỏi</span>}
                                {tmpSkStatus === 'KHÁ' && <span className="bg-emerald-100 border border-emerald-200 text-emerald-700 px-3 py-1 rounded-full text-xs font-extrabold shadow-sm">Khá</span>}
                                {tmpSkStatus === 'TRUNG_BÌNH' && <span className="bg-amber-100 border border-amber-200 text-amber-700 px-3 py-1 rounded-full text-xs font-extrabold shadow-sm">Trung bình</span>}
                                {tmpSkStatus === 'CHƯA_ĐẠT' && <span className="bg-rose-100 border border-rose-200 text-rose-700 px-3 py-1 rounded-full text-xs font-extrabold shadow-sm">Chưa đạt</span>}
                              </td>
                              <td className="py-4 px-5 text-center">
                                <button onClick={() => handleSaveEvalClick(s)} className="px-5 py-2 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white rounded-xl text-xs font-bold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 whitespace-nowrap">
                                  💾 Lưu Điểm
                                </button>
                              </td>
                            </tr>
                          );
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          {/* TAB 3: BÁO CÁO SỞ GD&ĐT */}
          {activeTab === 'report' && (
            <div className="max-w-7xl mx-auto px-6 space-y-8 animate-fade-in">
              <div className="flex justify-end print:hidden">
                <button onClick={() => window.print()} className="bg-slate-800 text-white font-bold px-5 py-2.5 rounded-xl shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all flex items-center text-sm cursor-pointer gap-2">
                  <span className="text-lg">🖨️</span> In Báo Cáo Sở GD&ĐT
                </button>
              </div>

              <div ref={reportRef} className="bg-white p-10 rounded-3xl border border-slate-200/60 shadow-lg print:shadow-none print:border-0 print:p-0">
                <div className="text-center mb-8">
                  <h3 className="font-extrabold text-xl text-slate-800">HỌC VIỆN ÔN NGỌC BeU</h3>
                  <p className="text-xs text-slate-500 font-medium mt-1">Trụ sở: 27 Lê Trung Nghĩa, Phường Bảy Hiền, TP. Hồ Chí Minh | Hotline: 1900 8888 02</p>
                  <h2 className="font-black text-2xl uppercase mt-8 text-indigo-900 tracking-tight">2. KẾT QUẢ TUYỂN SINH</h2>
                  <p className="text-sm font-bold text-indigo-600 mt-2 bg-indigo-50 inline-block px-4 py-1 rounded-full">
                    ({filterType === 'ALL' ? 'TOÀN BỘ THỜI GIAN' : `KỲ LỌC: ${filterType}`}) - TỔNG HỌC VIÊN: {filteredStudents.length} {filterBranch !== 'ALL' ? `(${filterBranch})` : ''}
                  </p>
                </div>

                <div className="rounded-2xl overflow-hidden border border-slate-200 mb-12">
                <table className="w-full border-collapse text-sm text-center print:text-xs">
                  <thead className="bg-slate-100 text-slate-700 font-extrabold text-xs uppercase tracking-wider">
                    <tr>
                      <th className="border-b border-r border-slate-200 py-4 px-4 print:py-2 print:border-slate-400 print:text-black">Khóa học</th>
                      <th className="border-b border-r border-slate-200 py-4 px-4 print:py-2 print:border-slate-400 print:text-black">Số lượng HV</th>
                      <th className="border-b border-r border-slate-200 py-4 px-4 print:py-2 print:border-slate-400 print:text-black">Số lớp</th>
                      <th className="border-b border-r border-slate-200 py-4 px-4 print:py-2 print:border-slate-400 print:text-black">Học Viên Nữ</th>
                      <th className="border-b border-r border-slate-200 py-4 px-4 print:py-2 print:border-slate-400 print:text-black">HV trên 18 tuổi</th>
                      <th className="border-b border-slate-200 py-4 px-4 print:py-2 print:border-slate-400 print:text-black">Người Việt Nam</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {coursesList.map((c, i) => {
                      const st = getCourseStats(c);
                      return (
                        <tr key={i} className="hover:bg-slate-50 font-medium">
                          <td className="border-r border-slate-100 py-3.5 px-4 text-left font-bold text-slate-800 print:py-2 print:border-slate-400">{c}</td>
                          <td className="border-r border-slate-100 py-3.5 px-4 font-extrabold text-indigo-600 print:py-2 print:border-slate-400">{st.total}</td>
                          <td className="border-r border-slate-100 py-3.5 px-4 font-bold text-slate-600 print:py-2 print:border-slate-400">{st.classes}</td>
                          <td className="border-r border-slate-100 py-3.5 px-4 font-bold text-slate-600 print:py-2 print:border-slate-400">{st.females}</td>
                          <td className="border-r border-slate-100 py-3.5 px-4 font-extrabold text-emerald-600 print:py-2 print:border-slate-400">{st.over18}</td>
                          <td className="py-3.5 px-4 font-bold text-slate-600 print:py-2 print:border-slate-400">{st.vn}</td>
                        </tr>
                      );
                    })}
                    <tr className="bg-indigo-50 font-extrabold text-indigo-900 uppercase text-xs tracking-wider">
                      <td className="border-r border-indigo-100 py-4 px-4 text-left print:py-2 print:border-slate-400">TỔNG CỘNG</td>
                      <td className="border-r border-indigo-100 py-4 px-4 text-indigo-700 text-base print:py-2 print:border-slate-400">{filteredStudents.length}</td>
                      <td className="border-r border-indigo-100 py-4 px-4 text-base print:py-2 print:border-slate-400">{coursesList.reduce((acc, c) => acc + getCourseStats(c).classes, 0)}</td>
                      <td className="border-r border-indigo-100 py-4 px-4 text-base print:py-2 print:border-slate-400">{filteredStudents.filter(s => s.gender === 'Nữ').length}</td>
                      <td className="border-r border-indigo-100 py-4 px-4 text-emerald-700 text-base print:py-2 print:border-slate-400">{filteredStudents.filter(s => s.age >= 18).length}</td>
                      <td className="py-4 px-4 text-base print:py-2 print:border-slate-400">{filteredStudents.length}</td>
                    </tr>
                  </tbody>
                </table>
                </div>
                
                <h2 className="font-black text-2xl text-indigo-900 mb-6 uppercase text-center mt-14 tracking-tight">3. KẾT QUẢ THỰC HIỆN CHẤT LƯỢNG NĂM HỌC</h2>
                
                <div className="rounded-2xl overflow-hidden border border-slate-200">
                <table className="w-full border-collapse text-xs text-center">
                  <thead className="bg-slate-800 text-white font-extrabold tracking-wider">
                    <tr>
                      <th className="border-b border-r border-slate-700 py-3 px-2 print:py-2 print:border-slate-400 print:text-black" rowSpan="2">STT</th>
                      <th className="border-b border-r border-slate-700 py-3 px-4 text-left print:py-2 print:border-slate-400 print:text-black" rowSpan="2">Nội dung đánh giá</th>
                      <th className="border-b border-r border-slate-700 py-3 px-3 print:py-2 print:border-slate-400 print:text-black" rowSpan="2">Tổng số</th>
                      <th className="border-b border-slate-700 py-2 px-3 print:py-2 print:border-slate-400 print:text-black" colSpan="5">Chi tiết theo khóa học</th>
                    </tr>
                    <tr>
                      <th className="border-b border-r border-slate-700 py-2 px-3 bg-slate-700 print:py-2 print:border-slate-400 print:text-black">Sơ cấp</th>
                      <th className="border-b border-r border-slate-700 py-2 px-3 bg-slate-700 print:py-2 print:border-slate-400 print:text-black">Trung cấp</th>
                      <th className="border-b border-r border-slate-700 py-2 px-3 bg-slate-700 print:py-2 print:border-slate-400 print:text-black">Cao cấp</th>
                      <th className="border-b border-r border-slate-700 py-2 px-3 bg-slate-700 print:py-2 print:border-slate-400 print:text-black">Giao tiếp</th>
                      <th className="border-b border-slate-700 py-2 px-3 bg-slate-700 print:py-2 print:border-slate-400 print:text-black">Thiếu nhi</th>
                    </tr>
                  </thead>
                  <tbody className="font-medium divide-y divide-slate-100 text-slate-700">
                    <tr className="bg-indigo-50/50 font-extrabold text-slate-800">
                      <td className="border-r border-slate-200 py-3 print:py-1 print:border-slate-400">I</td>
                      <td className="border-r border-slate-200 py-3 px-4 text-left print:py-1 print:border-slate-400">Tổng số Học Viên</td>
                      <td className="border-r border-slate-200 py-3 font-black text-indigo-600 text-sm print:py-1 print:border-slate-400">{filteredStudents.length}</td>
                      {coursesList.map((c, i) => <td key={i} className={`py-3 font-bold ${i !== coursesList.length -1 ? 'border-r border-slate-200' : ''} print:py-1 print:border-slate-400`}>{getCourseStats(c).total}</td>)}
                    </tr>
                    
                    {/* Phần II - Chuyên cần */}
                    <tr className="bg-slate-100 font-extrabold text-slate-800">
                      <td className="border-r border-slate-200 py-3 print:py-1 print:border-slate-400">II</td>
                      <td className="py-3 px-4 text-left print:py-1 print:border-slate-400" colSpan="7">Về thái độ và kỷ luật học tập (Chuyên cần)</td>
                    </tr>
                    {[
                      { label: '- Xuất sắc (≥95%)', val: 'XUẤT_SẮC', color: 'text-purple-600' },
                      { label: '- Tốt (≥90%)', val: 'TỐT', color: 'text-blue-600' },
                      { label: '- Khá (≥80%)', val: 'KHÁ', color: 'text-emerald-600' },
                      { label: '- Trung bình (≥70%)', val: 'TRUNG_BÌNH', color: 'text-amber-600' },
                      { label: '- Chưa đạt (<70%)', val: 'CHƯA_ĐẠT', color: 'text-rose-600' }
                    ].map((row, idx) => (
                      <tr key={idx} className="hover:bg-slate-50 transition-colors">
                        <td className="border-r border-slate-100 py-2 print:py-1 print:border-slate-400"></td>
                        <td className="border-r border-slate-100 py-2 px-4 text-left font-bold text-slate-600 print:py-1 print:border-slate-400">{row.label}</td>
                        <td className={`border-r border-slate-100 py-2 font-extrabold ${row.color} print:py-1 print:border-slate-400`}>{calcRatio(filteredStudents.filter(s => s.attendanceStatus === row.val).length, filteredStudents.length)}</td>
                        {coursesList.map((c, i) => <td key={i} className={`py-2 font-bold text-slate-500 ${i !== coursesList.length -1 ? 'border-r border-slate-100' : ''} print:py-1 print:border-slate-400`}>{calcRatio(getCourseStats(c).students.filter(s => s.attendanceStatus === row.val).length, getCourseStats(c).total)}</td>)}
                      </tr>
                    ))}

                    {/* Phần III - Kỹ năng */}
                    <tr className="bg-slate-100 font-extrabold text-slate-800">
                      <td className="border-r border-slate-200 py-3 print:py-1 print:border-slate-400">III</td>
                      <td className="py-3 px-4 text-left print:py-1 print:border-slate-400" colSpan="7">Về năng lực ngôn ngữ và kỹ năng (Điểm thi)</td>
                    </tr>
                    {[
                      { label: '- Xuất sắc (90-100%)', val: 'XUẤT_SẮC', color: 'text-purple-600' },
                      { label: '- Giỏi (80-89%)', val: 'GIỎI', color: 'text-blue-600' },
                      { label: '- Khá (70-79%)', val: 'KHÁ', color: 'text-emerald-600' },
                      { label: '- Trung bình (50-69%)', val: 'TRUNG_BÌNH', color: 'text-amber-600' },
                      { label: '- Chưa đạt (<50%)', val: 'CHƯA_ĐẠT', color: 'text-rose-600' }
                    ].map((row, idx) => (
                      <tr key={idx} className="hover:bg-slate-50 transition-colors">
                        <td className="border-r border-slate-100 py-2 print:py-1 print:border-slate-400"></td>
                        <td className="border-r border-slate-100 py-2 px-4 text-left font-bold text-slate-600 print:py-1 print:border-slate-400">{row.label}</td>
                        <td className={`border-r border-slate-100 py-2 font-extrabold ${row.color} print:py-1 print:border-slate-400`}>{calcRatio(filteredStudents.filter(s => s.skillStatus === row.val).length, filteredStudents.length)}</td>
                        {coursesList.map((c, i) => <td key={i} className={`py-2 font-bold text-slate-500 ${i !== coursesList.length -1 ? 'border-r border-slate-100' : ''} print:py-1 print:border-slate-400`}>{calcRatio(getCourseStats(c).students.filter(s => s.skillStatus === row.val).length, getCourseStats(c).total)}</td>)}
                      </tr>
                    ))}

                    {/* Phần IV - Tổng hợp */}
                    <tr className="bg-slate-100 font-extrabold text-slate-800">
                      <td className="border-r border-slate-200 py-3 print:py-1 print:border-slate-400">IV</td>
                      <td className="py-3 px-4 text-left print:py-1 print:border-slate-400" colSpan="7">Tổng hợp kết quả đánh giá cuối khóa</td>
                    </tr>
                    {[
                      { id: 'a', label: 'Hoàn thành Xuất sắc', val: 'XUẤT_SẮC', color: 'text-purple-600' },
                      { id: 'b', label: 'Hoàn thành Giỏi', val: 'GIỎI', color: 'text-blue-600' },
                      { id: 'c', label: 'Hoàn thành Khá', val: 'KHÁ', color: 'text-emerald-600' },
                      { id: 'd', label: 'Hoàn thành Trung bình', val: 'TRUNG_BÌNH', color: 'text-amber-600' },
                      { id: 'e', label: 'Chưa đạt', val: 'CHƯA_ĐẠT', color: 'text-rose-600' }
                    ].map((row, idx) => (
                      <tr key={idx} className="hover:bg-slate-50 transition-colors">
                        <td className="border-r border-slate-100 py-2.5 font-extrabold text-slate-500 print:py-1 print:border-slate-400">{row.id}</td>
                        <td className="border-r border-slate-100 py-2.5 px-4 text-left font-bold text-slate-700 print:py-1 print:border-slate-400">{row.label}</td>
                        <td className={`border-r border-slate-100 py-2.5 font-black text-sm ${row.color} print:py-1 print:border-slate-400`}>{calcRatio(filteredStudents.filter(s => s.finalGrade === row.val).length, filteredStudents.length)}</td>
                        {coursesList.map((c, i) => <td key={i} className={`py-2.5 font-bold text-slate-600 ${i !== coursesList.length -1 ? 'border-r border-slate-100' : ''} print:py-1 print:border-slate-400`}>{calcRatio(getCourseStats(c).students.filter(s => s.finalGrade === row.val).length, getCourseStats(c).total)}</td>)}
                      </tr>
                    ))}
                  </tbody>
                </table>
                </div>

                <div className="mt-12 flex justify-end print:mt-16">
                  <div className="text-center px-8">
                    <p className="font-black text-sm text-slate-800 print:text-black">GIÁM ĐỐC TRUNG TÂM</p>
                    <p className="text-xs text-slate-400 italic mt-1 print:text-black">(Ký tên, đóng dấu ghi rõ họ tên)</p>
                    <div className="h-28"></div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
